services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_BASE_URL: https://sos-backend.amptechnology.in
    container_name: super-admin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3051
    expose:
      - "3051"
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: amp_portal_backend_app-network
